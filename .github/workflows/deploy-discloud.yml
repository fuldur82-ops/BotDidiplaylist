name: Deploy to Discloud

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    env:
      APP_ID: ${{ secrets.DISCLOUD_APP_ID }}
      DISCLOUD_API_TOKEN: ${{ secrets.DISCLOUD_API_TOKEN }}
      DISCORD_TOKEN: ${{ secrets.DISCORD_TOKEN }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Validate required secrets
        run: |
          test -n "$APP_ID"
          test -n "$DISCLOUD_API_TOKEN"
          test -n "$DISCORD_TOKEN"

      - name: Build Discloud package
        run: |
          rm -rf discloud-package BotDidi-discloud.zip
          mkdir -p discloud-package/cogs discloud-package/utils
          cp cogs/music.py cogs/__init__.py discloud-package/cogs/
          cp utils/spotify.py utils/validators.py utils/youtube.py utils/__init__.py discloud-package/utils/
          cp main.py requirements.txt discloud.config discloud-package/
          printf 'DISCORD_TOKEN=%s\n' "$DISCORD_TOKEN" > discloud-package/.env
          cd discloud-package
          zip -r ../BotDidi-discloud.zip .

      - name: Deploy commit to Discloud
        run: |
          curl --fail --show-error --silent \
            -X PUT "https://api.discloud.app/v2/app/${APP_ID}/commit" \
            -H "api-token: ${DISCLOUD_API_TOKEN}" \
            -F "file=@BotDidi-discloud.zip"
